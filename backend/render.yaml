# Render Blueprint for Maya Voice SDR Backend (backend-root deploys)
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: maya-voice-sdr-backend
    runtime: python
    region: oregon
    plan: free
    healthCheckPath: /health
    buildCommand: >
      pip install -r requirements.txt &&
      python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')" &&
      python ingest.py &&
      python agent.py download-files
    startCommand: python -u agent.py start
    envVars:
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: CARTESIA_API_KEY
        sync: false
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.0
