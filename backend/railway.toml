[build]
builder = "NIXPACKS"
buildCommand = "python3 -m pip install --upgrade pip && python3 -m pip install -r requirements.txt && python3 -c \"from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')\" && python3 ingest.py && python3 agent.py download-files"

[deploy]
startCommand = "python3 -u agent.py start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
