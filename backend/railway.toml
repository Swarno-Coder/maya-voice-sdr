[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt && python -c \"from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')\" && python ingest.py && python agent.py download-files"

[deploy]
startCommand = "python -u agent.py start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
